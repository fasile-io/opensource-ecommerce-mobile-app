appId: ${APP_ID_ANDROID}
name: Product - Simple (Android)
tags:
  - product
  - smoke
  - android
---
- launchApp:
    clearState: true

# Find product via the top-right search icon
- assertVisible:
    text: ${home_tab}
- tapOn:
    point: ${search_icon_point}
- assertVisible:
    text: ${search_field}
- inputText: ${PRODUCT_NAME}
- assertVisible:
    text: "1 results found"
- tapOn:
    point: ${search_result_point}

# Verify PDP content
- assertVisible:
    text: ${PRODUCT_NAME}
- assertVisible:
    text: ${add_to_cart_button}

# Add to cart
- tapOn:
    text: ${add_to_cart_button}
- assertVisible:
    text: ${product_added_success}
