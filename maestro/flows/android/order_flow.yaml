appId: ${APP_ID_ANDROID}
name: Orders - Listing & Details (Android)
tags:
  - orders
  - regression
  - android
---
- launchApp:
    clearState: true

# Login
- assertVisible:
    text: ${home_tab}
- tapOn:
    point: ${account_tab_point}
- tapOn: ${login_button}
- assertVisible:
    id: login_email_field
- tapOn:
    id: login_email_field
- inputText: ${USER_EMAIL}
- tapOn:
    id: login_password_field
- inputText: ${USER_PASSWORD}
- tapOn:
    id: login_submit_button

# Open My Orders
- tapOn: ${my_orders}
- assertVisible:
    text: ${orders_header}

# Open first order card and verify details
- tapOn:
    point: ${order_first_card_point}
- assertVisible:
    text: ${order_details}
- assertVisible:
    text: "Price Break"
- assertVisible:
    text: "Grand Total"
