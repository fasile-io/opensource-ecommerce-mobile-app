appId: com.webkul.bagisto.mobikul
name: Debug Buy Now Path (Android)
tags:
  - debug
  - android
---
- tapOn:
    text: "Home"
    waitToSettleTimeoutMs: 1000
- assertVisible:
    text: "^Home$"
- tapOn:
    text: "^bagisto$"
    waitToSettleTimeoutMs: 1000
- eraseText
- inputText: "Apple iPhone Smartphone"
- extendedWaitUntil:
    visible:
      text: "^1 results found$"
    timeout: 10000
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "^Apple iPhone Smartphone$"
          index: 1
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 1500
      - extendedWaitUntil:
          visible:
            text: "^Buy Now$"
          timeout: 10000
- assertVisible:
    text: "^Buy Now$"
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "^Buy Now$"
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 2000
      - extendedWaitUntil:
          visible:
            text: "^Cart$"
          timeout: 15000
- assertVisible:
    text: "^Cart$"
- assertVisible:
    text: "^Pay Now$"
