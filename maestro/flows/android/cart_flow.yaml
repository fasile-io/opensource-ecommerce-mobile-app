appId: ${APP_ID_ANDROID}
name: Cart Flow (Android)
tags:
  - cart
  - smoke
  - android
---
- launchApp:
    clearState: true

# Add one product to cart
- assertVisible:
    text: ${home_tab}
- tapOn:
    point: ${search_icon_point}
- assertVisible:
    text: ${search_field}
- inputText: ${PRODUCT_NAME}
- tapOn:
    point: ${search_result_point}
- tapOn:
    text: ${add_to_cart_button}
- assertVisible:
    text: ${product_added_success}

# Open cart from the PDP header cart icon
- tapOn:
    point: ${pdp_cart_point}
- assertVisible:
    text: ${checkout_button}
- assertVisible:
    text: ${PRODUCT_NAME}
