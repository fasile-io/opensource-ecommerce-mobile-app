appId: ${APP_ID_ANDROID}
name: Checkout - Logged-in (Android)
tags:
  - checkout
  - customer
  - regression
  - android
---
- launchApp:
    clearState: true

# Login
- assertVisible:
    text: ${home_tab}
- tapOn:
    point: ${account_tab_point}
- tapOn: ${login_button}
- assertVisible:
    id: login_email_field
- tapOn:
    id: login_email_field
- inputText: ${USER_EMAIL}
- tapOn:
    id: login_password_field
- inputText: ${USER_PASSWORD}
- tapOn:
    id: login_submit_button
- assertVisible:
    text: ${my_orders}

# Add product to cart
- tapOn:
    point: ${home_tab_point}
- tapOn:
    point: ${search_icon_point}
- assertVisible:
    text: ${search_field}
- inputText: ${PRODUCT_NAME}
- tapOn:
    point: ${search_result_point}
- tapOn:
    text: ${add_to_cart_button}
- assertVisible:
    text: ${product_added_success}

- tapOn:
    point: ${pdp_cart_point}
- assertVisible:
    text: ${PRODUCT_NAME}
- tapOn:
    text: ${checkout_button}

# Verify checkout screen is ready
- assertVisible:
    text: "Checkout"
- assertVisible:
    text: ${PRODUCT_NAME}
- assertVisible:
    text: ${place_order_button}
