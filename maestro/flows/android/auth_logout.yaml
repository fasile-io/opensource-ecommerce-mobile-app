appId: com.webkul.bagisto.mobikul
name: Auth - Logout (Android)
tags:
  - auth
  - regression
  - android
env:
  USER_EMAIL: "demo.user@example.com"
  USER_PASSWORD: "ExamplePass123!"
---
# Selector rule: keep this flow label-based only.
- runFlow: helpers/normalize_to_home_attached.yaml
- tapOn:
    text: "^Account$"
    waitToSettleTimeoutMs: 1000
- runFlow: dismiss_runtime_permissions.yaml
- runFlow:
    when:
      visible:
        text: "^Login$"
    commands:
      - runFlow: helpers/open_login_from_account.yaml
      - runFlow: helpers/login_existing_customer.yaml
- assertVisible:
    text: "^My Orders$"

- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "^Account$"
          rightOf: "^My Orders$"
          waitToSettleTimeoutMs: 1000
      - extendedWaitUntil:
          visible:
            text: "^Logout$"
          timeout: 10000

- scrollUntilVisible:
    element: "Logout"
    direction: DOWN
    timeout: 8000
    speed: 40
    visibilityPercentage: 50
    centerElement: true
- tapOn:
    text: "^Logout$"
    waitToSettleTimeoutMs: 1000
- assertVisible:
    text: "^Are you sure you want to logout\\?$"
- tapOn:
    text: "^Logout$"
    rightOf: "^Cancel$"
    waitToSettleTimeoutMs: 1000
- extendedWaitUntil:
    visible:
      text: "^(Nice to see you here|Login|Sign Up)$"
    timeout: 15000
- assertVisible:
    text: "^Nice to see you here$"
- assertVisible:
    text: "^Sign Up$"
- assertVisible:
    text: "^Login$"
