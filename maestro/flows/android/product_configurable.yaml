appId: ${APP_ID_ANDROID}
name: Product - Configurable (Android)
tags:
  - product
  - regression
  - android
---
- launchApp:
    clearState: true

# Navigate to configurable product (first item assumed configurable)
- tapOn:
    id: ${categories_tab}
- tapOn:
    id: ${category_item}
    index: 0
- assertVisible:
    id: ${product_item}
- tapOn:
    id: ${product_item}
    index: 1

- assertVisible:
    id: ${product_name}

# Select options
- tapOn:
    text: ${CONFIG_SIZE_OPTION}
- tapOn:
    text: ${CONFIG_COLOR_OPTION}

# Validate PDP basics
- assertVisible:
    id: ${product_image}
- assertVisible:
    id: ${product_price}

# Add to cart after selection
- tapOn:
    id: ${add_to_cart_button}
