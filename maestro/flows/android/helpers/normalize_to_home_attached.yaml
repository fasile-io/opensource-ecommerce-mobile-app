appId: com.webkul.bagisto.mobikul
---
- retry:
    maxRetries: 3
    commands:
      - runFlow:
          when:
            visible:
              text: "^Checkout$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Orders #.*$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Orders$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Search products$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^1 results found$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^No products found$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^(Add to Cart|Buy Now)$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Create Account$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Forgot Password\\?$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Welcome back!$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Mobikul Bagisto Laravel App$"
          commands:
            - tapOn:
                text: "^Mobikul Bagisto Laravel App$"
                waitToSettleTimeoutMs: 1500
            - waitForAnimationToEnd
      - runFlow: dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^(Home|Don.?t allow|Allow|While using the app|Allow only while using the app|Only this time)$"
          timeout: 30000
      - runFlow: dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^Home$"
          timeout: 15000
      - tapOn:
          text: "Home"
          waitToSettleTimeoutMs: 1000
      - assertVisible:
          text: "^Account$"
