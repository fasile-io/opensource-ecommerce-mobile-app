appId: ${APP_ID_ANDROID}
name: Checkout - Guest (Android)
tags:
  - checkout
  - guest
  - regression
  - android
---
- launchApp:
    clearState: true

# Add product to cart
- tapOn: ${home_tab}
- tapOn: ${search_field}
- inputText: ${PRODUCT_NAME}
- tapOn: ${PRODUCT_NAME}
- tapOn:
    text: ${add_to_cart_button}

- tapOn: ${cart_tab}
- tapOn:
    text: ${checkout_button}

# Choose guest checkout
- tapOn:
    text: ${guest_checkout}

# Shipping address (single multi-line field assumed)
- tapOn:
    text: ${address_field}
- inputText: "${ADDRESS_FULL_NAME}\n${ADDRESS_LINE1}\n${ADDRESS_CITY}, ${ADDRESS_STATE} ${ADDRESS_ZIP}\n${ADDRESS_COUNTRY}\n${ADDRESS_PHONE}"

# Shipping method
- tapOn: ${SHIPPING_METHOD_LABEL}

# Payment method
- tapOn: ${PAYMENT_METHOD_LABEL}

# Place order
- tapOn:
    text: ${place_order_button}
- assertVisible:
    text: ${order_details}
