appId: ${APP_ID_ANDROID}
name: Home & Navigation (Android)
tags:
  - home
  - navigation
  - smoke
  - android
---
- launchApp:
    clearState: true

# Home loads and core tabs are visible
- assertVisible:
    text: ${home_tab}
- assertVisible:
    text: ${categories_tab}
- assertVisible:
    text: ${account_tab}

# Navigate to Account and back home
- tapOn:
    point: ${account_tab_point}
- assertVisible:
    text: ${login_button}
- tapOn:
    point: ${home_tab_point}
- assertVisible:
    text: ${home_tab}
