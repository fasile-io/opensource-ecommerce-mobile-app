appId: ${APP_ID_ANDROID}
name: Auth - Login (invalid creds, Android)
tags:
  - auth
  - negative
  - android
---
- launchApp:
    clearState: true

# Wait for home to load
- assertVisible:
    text: ${home_tab}

# Open Account tab, then Login screen
- tapOn: ${account_tab}
- tapOn: ${login_button}
- assertVisible:
    text: ${email_field}

- tapOn:
    text: ${email_field}
- inputText: "invalid.user@example.com"
- tapOn:
    text: ${password_field}
- inputText: "WrongPass1!"
- tapOn:
    text: ${login_button}

- assertVisible:
    text: ${login_button}
