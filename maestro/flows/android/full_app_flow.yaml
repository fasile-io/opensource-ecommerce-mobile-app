appId: ${APP_ID_ANDROID}
name: Full App E2E Suite (Android)
tags:
  - e2e
  - regression
  - android
---
- launchApp:
    clearState: true

# Login
- assertVisible:
    text: ${home_tab}
- tapOn:
    point: ${account_tab_point}
- tapOn: ${login_button}
- assertVisible:
    id: login_email_field
- tapOn:
    id: login_email_field
- inputText: ${USER_EMAIL}
- tapOn:
    id: login_password_field
- inputText: ${USER_PASSWORD}
- tapOn:
    id: login_submit_button
- assertVisible:
    text: ${my_orders}

# Home -> Search -> PDP
- tapOn:
    point: ${home_tab_point}
- tapOn:
    point: ${search_icon_point}
- assertVisible:
    text: ${search_field}
- inputText: ${PRODUCT_NAME}
- assertVisible:
    text: "1 results found"
- tapOn:
    point: ${search_result_point}
- assertVisible:
    text: ${PRODUCT_NAME}
- assertVisible:
    text: ${add_to_cart_button}

# Add to cart and open cart
- tapOn:
    text: ${add_to_cart_button}
- assertVisible:
    text: ${product_added_success}
- tapOn:
    point: ${pdp_cart_point}
- assertVisible:
    text: "Cart"
- assertVisible:
    text: ${PRODUCT_NAME}
- assertVisible:
    text: ${checkout_button}

# Checkout readiness
- tapOn:
    text: ${checkout_button}
- assertVisible:
    text: "Checkout"
- assertVisible:
    text: ${PRODUCT_NAME}
- assertVisible:
    text: ${place_order_button}

# Orders area
- back
- tapOn:
    point: ${account_tab_point}
- tapOn: ${my_orders}
- assertVisible:
    text: ${orders_header}
- tapOn:
    point: ${order_first_card_point}
- assertVisible:
    text: ${order_details}
- assertVisible:
    text: "Price Break"
- assertVisible:
    text: "Grand Total"
