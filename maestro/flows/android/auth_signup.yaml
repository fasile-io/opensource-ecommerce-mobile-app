appId: com.webkul.bagisto.mobikul
name: Auth - Signup (new user, Android)
tags:
  - auth
  - regression
  - android
env:
  SIGNUP_FIRST_NAME: "Demo"
  SIGNUP_LAST_NAME: "User"
  SIGNUP_EMAIL_PREFIX: "demo.signup"
  NEW_USER_PASSWORD: "ExamplePass123!"
---
# Selector rule: keep this flow label-based only.
# Run this after a clean app open so the guest home screen is visible.
- runScript:
    file: ../../scripts/generate_signup_email.js
    env:
      EMAIL_PREFIX: ${SIGNUP_EMAIL_PREFIX}

- extendedWaitUntil:
    visible:
      text: "^(Home|Don.?t allow|Allow|While using the app|Allow only while using the app|Only this time)$"
    timeout: 30000
- runFlow: helpers/dismiss_runtime_permissions.yaml
- extendedWaitUntil:
    visible:
      text: "^Home$"
    timeout: 15000
- tapOn:
    text: "^Account$"
    waitToSettleTimeoutMs: 1000
- runFlow: helpers/dismiss_runtime_permissions.yaml
- assertVisible:
    text: "^Sign Up$"
- assertVisible:
    text: "^Login$"
- tapOn:
    text: "^Sign Up$"
    waitToSettleTimeoutMs: 1000

- extendedWaitUntil:
    visible:
      text: "^Create Account$"
    timeout: 10000
- assertVisible:
    text: "^Sign up to get started$"
- tapOn:
    text: "^First name$"
- inputText: ${SIGNUP_FIRST_NAME}
- tapOn:
    text: "^Last name$"
- inputText: ${SIGNUP_LAST_NAME}
- tapOn:
    text: "^Enter your email$"
- inputText: ${output.UNIQUE_SIGNUP_EMAIL}
- tapOn:
    text: "^Create a password$"
- inputText: ${NEW_USER_PASSWORD}
- tapOn:
    text: "^Confirm your password$"
- inputText: ${NEW_USER_PASSWORD}
- hideKeyboard
- tapOn:
    text: "^Sign Up$"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1500
- runFlow: helpers/dismiss_runtime_permissions.yaml
- extendedWaitUntil:
    visible:
      text: "^(Login to your account|My Orders)$"
    timeout: 30000
- runFlow:
    when:
      visible:
        text: "^Login to your account$"
    commands:
      - assertVisible:
          text: "^Welcome back!$"
      - assertVisible:
          text: "^Login$"
- runFlow:
    when:
      visible:
        text: "^My Orders$"
    commands:
      - assertVisible:
          text: "^My Orders$"
