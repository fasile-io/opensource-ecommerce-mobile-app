appId: com.webkul.bagisto.mobikul
name: Auth - Forgot Password (Android)
tags:
  - auth
  - regression
  - android
env:
  FORGOT_PASSWORD_EMAIL: "demo.user@example.com"
---
# Selector rule: keep this flow label-based only.
# Run this after a clean app open so the guest home screen is visible.
- extendedWaitUntil:
    visible:
      text: "^(Home|Don.?t allow|Allow|While using the app|Allow only while using the app|Only this time)$"
    timeout: 30000
- runFlow: helpers/dismiss_runtime_permissions.yaml
- extendedWaitUntil:
    visible:
      text: "^Home$"
    timeout: 15000
- tapOn:
    text: "^Account$"
    waitToSettleTimeoutMs: 1000
- runFlow: helpers/dismiss_runtime_permissions.yaml
- assertVisible:
    text: "^Sign Up$"
- assertVisible:
    text: "^Login$"
- runFlow: helpers/open_login_from_account.yaml

- tapOn:
    text: "^Forgot Password\\?$"
    waitToSettleTimeoutMs: 1000
- extendedWaitUntil:
    visible:
      text: "^Forgot Password\\?$"
    timeout: 10000
- assertVisible:
    text: "^Enter your email address and we'll send you a link to reset your password\\.$"
- assertVisible:
    text: "^Back to Login$"
- tapOn:
    text: "^Enter your email$"
- inputText: ${FORGOT_PASSWORD_EMAIL}
- hideKeyboard
- tapOn:
    text: "^Send Reset Link$"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1500
- extendedWaitUntil:
    visible:
      text: "^(Welcome back!|Login to your account)$"
    timeout: 20000
- assertVisible:
    text: "^Welcome back!$"
- assertVisible:
    text: "^Login to your account$"
