appId: ${APP_ID_ANDROID}
name: Category & Catalog (Android)
tags:
  - catalog
  - regression
  - android
---
- launchApp:
    clearState: true

# Navigate to catalog
- tapOn:
    id: ${categories_tab}
- tapOn:
    id: ${category_item}
    index: 0

- assertVisible:
    id: ${product_item}

# Apply filter (if available)
- tapOn:
    id: ${filter_button}
- assertVisible:
    text: ${FILTER_LABEL}
- tapOn: ${FILTER_LABEL}
- tapOn: "Apply"
- assertVisible:
    id: ${product_item}

# Apply sorting
- tapOn:
    id: ${sort_button}
- assertVisible:
    text: ${SORT_LABEL}
- tapOn: ${SORT_LABEL}
- assertVisible:
    id: ${product_item}
