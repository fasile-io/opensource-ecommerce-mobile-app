appId: com.webkul.bagisto.mobikul
name: Full App E2E Suite Attached (Android)
tags:
  - e2e
  - regression
  - android
  - attached
env:
  USER_EMAIL: "demo.user@example.com"
  USER_PASSWORD: "ExamplePass123!"
---
# Assumes the app is already open. This attached flow normalizes the current
# screen first so it can recover from prior aborted runs.
# Selector rule: keep this flow label-based only. See maestro/LABEL_BASED_INSTRUCTIONS.md.

# Normalize to a root screen that has the bottom navigation visible.
- retry:
    maxRetries: 3
    commands:
      - runFlow:
          when:
            visible:
              text: "^Checkout$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Orders #.*$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Orders$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: login_email_field
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Search products$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^1 results found$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^No products found$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^(Add to Cart|Buy Now)$"
          commands:
            - back
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "^Mobikul Bagisto Laravel App$"
          commands:
            - tapOn:
                text: "^Mobikul Bagisto Laravel App$"
                waitToSettleTimeoutMs: 1500
            - waitForAnimationToEnd
      - runFlow: helpers/dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^(Home|Don.?t allow|Allow|While using the app|Allow only while using the app|Only this time)$"
          timeout: 30000
      - runFlow: helpers/dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^Home$"
          timeout: 15000
      - tapOn:
          text: "Home"
          waitToSettleTimeoutMs: 1000
      - runFlow: helpers/dismiss_runtime_permissions.yaml
      - assertVisible:
          text: "^Account$"

# Ensure the account is signed in.
- tapOn:
    text: "Account"
    waitToSettleTimeoutMs: 1000
- runFlow: helpers/dismiss_runtime_permissions.yaml
- runFlow:
    when:
      visible:
        text: "^Login$"
    commands:
      - tapOn:
          text: "^Login$"
          waitToSettleTimeoutMs: 1000
- runFlow:
    when:
      visible:
        id: login_email_field
    commands:
      - tapOn:
          id: login_email_field
      - eraseText
      - inputText: ${USER_EMAIL}
      - tapOn:
          id: login_password_field
      - eraseText
      - inputText: ${USER_PASSWORD}
      - tapOn:
          id: login_submit_button
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 1500
      - runFlow: helpers/dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^My Orders$"
          timeout: 10000
- assertVisible:
    text: "^My Orders$"

# Home -> Search -> PDP
- tapOn:
    text: "Home"
    waitToSettleTimeoutMs: 1000
- runFlow: helpers/dismiss_runtime_permissions.yaml
- assertVisible:
    text: "^Home$"
- tapOn:
    text: "^bagisto$"
    waitToSettleTimeoutMs: 1000
- runFlow: helpers/dismiss_runtime_permissions.yaml
- eraseText
- inputText: "Apple iPhone Smartphone"
- runFlow: helpers/dismiss_runtime_permissions.yaml
- extendedWaitUntil:
    visible:
      text: "^1 results found$"
    timeout: 10000
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "(?s)^Apple iPhone Smartphone\\n.*$"
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 1500
      - runFlow: helpers/dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^Buy Now$"
          timeout: 10000
      - assertVisible:
          text: "^Buy Now$"

# Add to cart and open cart
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "^Buy Now$"
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 2000
      - runFlow: helpers/dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^Cart$"
          timeout: 15000
- extendedWaitUntil:
    visible:
      text: "^Cart$"
    timeout: 10000
- assertVisible:
    text: "^Cart$"
- scrollUntilVisible:
    element: "Apple iPhone Smartphone"
    direction: DOWN
    timeout: 8000
    speed: 40
    visibilityPercentage: 50
    centerElement: true
- assertVisible:
    text: "Apple iPhone Smartphone"
- assertVisible:
    text: "^Pay Now$"

# Checkout readiness
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "^Pay Now$"
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 2000
      - runFlow: helpers/dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^Checkout$"
          timeout: 15000
- assertVisible:
    text: "^Checkout$"
- scrollUntilVisible:
    element: "Apple iPhone Smartphone"
    direction: DOWN
    timeout: 8000
    speed: 40
    visibilityPercentage: 40
    centerElement: false
- assertVisible:
    text: "Apple iPhone Smartphone"
- extendedWaitUntil:
    visible:
      text: "^Place Order$"
    timeout: 5000
- assertVisible:
    text: "^Place Order$"
- scrollUntilVisible:
    element: "Payment Method"
    direction: DOWN
    timeout: 8000
    speed: 40
    visibilityPercentage: 40
    centerElement: false
- assertVisible:
    text: "^Payment Method$"
- extendedWaitUntil:
    visible:
      text: "(?s)^(Cash On Delivery|Money Transfer)\\n.*$"
    timeout: 15000
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "(?s)^(Cash On Delivery|Money Transfer)\\n.*$"
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 1500
      - runFlow: helpers/dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^Place Order$"
          timeout: 5000
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "^Place Order$"
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 2000
      - runFlow: helpers/dismiss_runtime_permissions.yaml
      - extendedWaitUntil:
          visible:
            text: "^Thank you for your order!$"
          timeout: 30000
- assertVisible:
    text: "^Thank you for your order!$"
- assertVisible:
    text: "^View Order$"

# Orders area
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: "^View Order$"
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 1500
      - extendedWaitUntil:
          visible:
            text: "^Details$"
          timeout: 10000
- assertVisible:
    text: "^Details$"
- scrollUntilVisible:
    element: "Price Break"
    direction: DOWN
    timeout: 8000
    speed: 40
    visibilityPercentage: 50
    centerElement: true
- assertVisible:
    text: "^Price Break$"
- assertVisible:
    text: "^Grand Total$"
